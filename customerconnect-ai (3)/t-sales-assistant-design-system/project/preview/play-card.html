<!doctype html>
<html><head><meta charset="utf-8"><style>
/* Shared card frame for design-system previews.
   Self-contained — tokens duplicated locally so this works when inlined
   into <style> blocks (preview iframes can 401 on cross-path CSS fetches).
   The Poppins @import is inlined by each HTML file directly. */

@import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700;800;900&display=swap");

:root {
  --t-magenta: #E20074;
  --t-magenta-hover: #C70066;
  --t-berry: #861B54;
  --t-magenta-hot: #FF2D8A;

  --font-sans: "Poppins", ui-sans-serif, system-ui, sans-serif;
  --glass-blur: blur(32px) saturate(180%);
  --glass-blur-strong: blur(40px) saturate(200%);

  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-2xl: 20px;
  --radius-full: 999px;
}

:root {
  /* Dark theme tokens — mirrored from colors_and_type.css [data-theme="dark"]
     so previews inherit Liquid Glass over the magenta substrate by default. */
  --bg-page: #0D0D0D;
  --bg-page-secondary: #161616;
  --bg-surface: rgba(22, 22, 22, 0.98);
  --bg-surface-elevated: rgba(30, 30, 30, 0.98);

  --border-surface: #2A2A2A;
  --border-surface-strong: rgba(226, 0, 116, 0.30);

  --text-primary: #F0F0F0;
  --text-secondary: #9A9A9A;
  --text-tertiary: #858585;
  --text-muted: #858585;
  --text-accent: #FF2D8A;
  --text-pitch: #F0A0C8;

  --glass-bg: rgba(255, 255, 255, 0.08);
  --glass-bg-strong: rgba(255, 255, 255, 0.14);
  --glass-bg-tinted: rgba(226, 0, 116, 0.14);
  --glass-border: rgba(255, 255, 255, 0.12);
  --glass-border-subtle: rgba(255, 255, 255, 0.07);
  --glass-border-hover: rgba(226, 0, 116, 0.35);

  --glass-specular-top: rgba(255, 255, 255, 0.45);
  --glass-specular-bottom: rgba(255, 255, 255, 0.08);
  --glass-ring-light: rgba(255, 255, 255, 0.10);
  --glass-ring-dark: rgba(0, 0, 0, 0.00);

  --glass-shadow:
    0 16px 40px rgba(0, 0, 0, 0.35),
    0 2px 8px rgba(0, 0, 0, 0.20),
    inset 0 1px 0 0 rgba(255, 255, 255, 0.45),
    inset 0 -1px 0 0 rgba(255, 255, 255, 0.08),
    inset 0 0 0 1px rgba(255, 255, 255, 0.10);

  --glass-shadow-elevated:
    0 24px 60px rgba(0, 0, 0, 0.45),
    0 4px 12px rgba(0, 0, 0, 0.25),
    inset 0 1px 0 0 rgba(255, 255, 255, 0.55),
    inset 0 -1px 0 0 rgba(255, 255, 255, 0.10),
    inset 0 0 0 1px rgba(255, 255, 255, 0.16);

  --glass-shadow-magenta:
    0 16px 40px rgba(226, 0, 116, 0.28),
    0 2px 8px rgba(0, 0, 0, 0.20),
    inset 0 1px 0 0 rgba(255, 180, 220, 0.55),
    inset 0 -1px 0 0 rgba(226, 0, 116, 0.18),
    inset 0 0 0 1px rgba(255, 255, 255, 0.14);

  --glass-shadow-strong: var(--glass-shadow-elevated);

  --page-bg:
    radial-gradient(ellipse 60% 50% at 15% 10%, rgba(255, 45, 138, 0.55) 0%, transparent 55%),
    radial-gradient(ellipse 55% 50% at 90% 30%, rgba(226, 0, 116, 0.50) 0%, transparent 50%),
    radial-gradient(ellipse 70% 60% at 70% 95%, rgba(134, 27, 84, 0.55) 0%, transparent 50%),
    radial-gradient(ellipse 50% 50% at 10% 85%, rgba(160, 0, 80, 0.50) 0%, transparent 55%),
    linear-gradient(180deg, #0D0D0D 0%, #1A0912 60%, #0D0D0D 100%);

  color-scheme: dark;
}

* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  font-family: var(--font-sans);
  background: var(--page-bg);
  background-attachment: fixed;
  color: var(--text-primary);
  min-height: 100%;
  -webkit-font-smoothing: antialiased;
}
body {
  padding: 20px;
  overflow: hidden;
}
.frame {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.row { display: flex; gap: 12px; align-items: stretch; }
.col { display: flex; flex-direction: column; gap: 8px; }

/* Liquid-glass card — pulls the full recipe from tokens */
.glass {
  background: var(--glass-bg);
  -webkit-backdrop-filter: var(--glass-blur);
  backdrop-filter: var(--glass-blur);
  box-shadow: var(--glass-shadow);
  border-radius: 16px;
}
.glass-magenta {
  background: var(--glass-bg-tinted);
  -webkit-backdrop-filter: var(--glass-blur);
  backdrop-filter: var(--glass-blur);
  box-shadow: var(--glass-shadow-magenta);
  border-radius: 16px;
}
.glass-elevated {
  background: var(--glass-bg-strong);
  -webkit-backdrop-filter: var(--glass-blur-strong);
  backdrop-filter: var(--glass-blur-strong);
  box-shadow: var(--glass-shadow-elevated);
  border-radius: 16px;
}

.eyebrow {
  font-size: 9px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--text-accent);
}
.eyebrow--muted { color: var(--text-secondary); }

</style>
<style>
  body { padding: 16px; }
  .card {
    background: var(--glass-bg);
    -webkit-backdrop-filter: var(--glass-blur);
    backdrop-filter: var(--glass-blur);
    box-shadow: var(--glass-shadow);
    border-radius: 20px;
    padding: 16px;
  }
  .eyebrow { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-secondary); margin-bottom: 10px; }
  .row { display: flex; align-items: center; gap: 8px; }
  .badge {
    width: 26px; height: 26px; border-radius: 999px;
    background: var(--glass-bg-tinted);
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.45);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--t-magenta); font-weight: 900; font-size: 11px; flex-shrink: 0;
  }
  .title { font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.01em; color: var(--text-primary); }
  .desc { font-size: 11px; font-weight: 500; color: var(--text-secondary); line-height: 1.45; margin: 6px 0 0 34px; }
  .tt-well {
    margin: 10px 0 0 34px;
    background: var(--glass-bg-tinted);
    -webkit-backdrop-filter: blur(16px);
    backdrop-filter: blur(16px);
    box-shadow:
      inset 0 1px 0 0 rgba(255, 255, 255, 0.45),
      inset 0 0 0 1px rgba(226, 0, 116, 0.12);
    border-radius: 14px;
    padding: 10px 12px;
    position: relative;
  }
  .tt-well::before { content:''; position:absolute; left:-2px; top: 50%; transform: translateY(-50%); width: 3px; height: 18px; background: var(--t-magenta); border-radius: 3px; }
  .tt { font-size: 12px; font-weight: 700; line-height: 1.55; color: var(--text-accent); }
</style></head>
<body>
  <div class="card">
    <div class="eyebrow">Quick Plays</div>
    <div class="row"><span class="badge">⚡</span><span class="title">The "What Brings You In" Open</span></div>
    <div class="desc">Lower the pressure by acknowledging they might just be looking.</div>
    <div class="tt-well"><div class="tt">"Hey! No pressure at all — are you just exploring what's out there today, or did something specific catch your eye?"</div></div>
  </div>
</body></html>
