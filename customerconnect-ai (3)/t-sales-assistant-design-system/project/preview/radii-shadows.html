<!doctype html>
<html><head><meta charset="utf-8"><style>
/* Shared card frame for design-system previews.
   Self-contained — tokens duplicated locally so this works when inlined
   into <style> blocks (preview iframes can 401 on cross-path CSS fetches).
   The Poppins @import is inlined by each HTML file directly. */

@import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700;800;900&display=swap");

:root {
  --t-magenta: #E20074;
  --t-magenta-hover: #C70066;
  --t-berry: #861B54;
  --t-magenta-hot: #FF2D8A;

  --font-sans: "Poppins", ui-sans-serif, system-ui, sans-serif;
  --glass-blur: blur(32px) saturate(180%);
  --glass-blur-strong: blur(40px) saturate(200%);

  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-2xl: 20px;
  --radius-full: 999px;
}

:root {
  /* Dark theme tokens — mirrored from colors_and_type.css [data-theme="dark"]
     so previews inherit Liquid Glass over the magenta substrate by default. */
  --bg-page: #0D0D0D;
  --bg-page-secondary: #161616;
  --bg-surface: rgba(22, 22, 22, 0.98);
  --bg-surface-elevated: rgba(30, 30, 30, 0.98);

  --border-surface: #2A2A2A;
  --border-surface-strong: rgba(226, 0, 116, 0.30);

  --text-primary: #F0F0F0;
  --text-secondary: #9A9A9A;
  --text-tertiary: #858585;
  --text-muted: #858585;
  --text-accent: #FF2D8A;
  --text-pitch: #F0A0C8;

  --glass-bg: rgba(255, 255, 255, 0.08);
  --glass-bg-strong: rgba(255, 255, 255, 0.14);
  --glass-bg-tinted: rgba(226, 0, 116, 0.14);
  --glass-border: rgba(255, 255, 255, 0.12);
  --glass-border-subtle: rgba(255, 255, 255, 0.07);
  --glass-border-hover: rgba(226, 0, 116, 0.35);

  --glass-specular-top: rgba(255, 255, 255, 0.45);
  --glass-specular-bottom: rgba(255, 255, 255, 0.08);
  --glass-ring-light: rgba(255, 255, 255, 0.10);
  --glass-ring-dark: rgba(0, 0, 0, 0.00);

  --glass-shadow:
    0 16px 40px rgba(0, 0, 0, 0.35),
    0 2px 8px rgba(0, 0, 0, 0.20),
    inset 0 1px 0 0 rgba(255, 255, 255, 0.45),
    inset 0 -1px 0 0 rgba(255, 255, 255, 0.08),
    inset 0 0 0 1px rgba(255, 255, 255, 0.10);

  --glass-shadow-elevated:
    0 24px 60px rgba(0, 0, 0, 0.45),
    0 4px 12px rgba(0, 0, 0, 0.25),
    inset 0 1px 0 0 rgba(255, 255, 255, 0.55),
    inset 0 -1px 0 0 rgba(255, 255, 255, 0.10),
    inset 0 0 0 1px rgba(255, 255, 255, 0.16);

  --glass-shadow-magenta:
    0 16px 40px rgba(226, 0, 116, 0.28),
    0 2px 8px rgba(0, 0, 0, 0.20),
    inset 0 1px 0 0 rgba(255, 180, 220, 0.55),
    inset 0 -1px 0 0 rgba(226, 0, 116, 0.18),
    inset 0 0 0 1px rgba(255, 255, 255, 0.14);

  --glass-shadow-strong: var(--glass-shadow-elevated);

  --page-bg:
    radial-gradient(ellipse 60% 50% at 15% 10%, rgba(255, 45, 138, 0.55) 0%, transparent 55%),
    radial-gradient(ellipse 55% 50% at 90% 30%, rgba(226, 0, 116, 0.50) 0%, transparent 50%),
    radial-gradient(ellipse 70% 60% at 70% 95%, rgba(134, 27, 84, 0.55) 0%, transparent 50%),
    radial-gradient(ellipse 50% 50% at 10% 85%, rgba(160, 0, 80, 0.50) 0%, transparent 55%),
    linear-gradient(180deg, #0D0D0D 0%, #1A0912 60%, #0D0D0D 100%);

  color-scheme: dark;
}

* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  font-family: var(--font-sans);
  background: var(--page-bg);
  background-attachment: fixed;
  color: var(--text-primary);
  min-height: 100%;
  -webkit-font-smoothing: antialiased;
}
body {
  padding: 20px;
  overflow: hidden;
}
.frame {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.row { display: flex; gap: 12px; align-items: stretch; }
.col { display: flex; flex-direction: column; gap: 8px; }

/* Liquid-glass card — pulls the full recipe from tokens */
.glass {
  background: var(--glass-bg);
  -webkit-backdrop-filter: var(--glass-blur);
  backdrop-filter: var(--glass-blur);
  box-shadow: var(--glass-shadow);
  border-radius: 16px;
}
.glass-magenta {
  background: var(--glass-bg-tinted);
  -webkit-backdrop-filter: var(--glass-blur);
  backdrop-filter: var(--glass-blur);
  box-shadow: var(--glass-shadow-magenta);
  border-radius: 16px;
}
.glass-elevated {
  background: var(--glass-bg-strong);
  -webkit-backdrop-filter: var(--glass-blur-strong);
  backdrop-filter: var(--glass-blur-strong);
  box-shadow: var(--glass-shadow-elevated);
  border-radius: 16px;
}

.eyebrow {
  font-size: 9px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--text-accent);
}
.eyebrow--muted { color: var(--text-secondary); }

</style>
<style>
  body { padding: 18px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .tile {
    padding: 16px 12px;
    display: flex; flex-direction: column; gap: 10px; align-items: flex-start;
    background: var(--glass-bg);
    -webkit-backdrop-filter: var(--glass-blur);
    backdrop-filter: var(--glass-blur);
  }
  .r-lg { border-radius: 8px; }
  .r-xl { border-radius: 12px; }
  .r-2xl { border-radius: 16px; }
  .r-3xl { border-radius: 20px; }
  .tile .label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-primary); }
  .tile .val { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: var(--text-muted); }

  .s-rest     { box-shadow: var(--glass-shadow); }
  .s-elevated { box-shadow: var(--glass-shadow-elevated); background: var(--glass-bg-strong); -webkit-backdrop-filter: var(--glass-blur-strong); backdrop-filter: var(--glass-blur-strong); }
  .s-magenta  { box-shadow: var(--glass-shadow-magenta); background: var(--glass-bg-tinted); }
  .s-cta      { box-shadow: 0 10px 22px rgba(226, 0, 116, 0.28), inset 0 1px 0 0 rgba(255,255,255,0.35); background: var(--t-magenta); }

  .sec-title { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-secondary); margin: 0 0 10px; }
</style></head>
<body>
  <div class="sec-title">Radii</div>
  <div class="grid" style="margin-bottom: 14px;">
    <div class="tile r-lg s-rest"><div class="label">rounded-lg</div><div class="val">8px · inputs</div></div>
    <div class="tile r-xl s-rest"><div class="label">rounded-xl</div><div class="val">12px · compact</div></div>
    <div class="tile r-2xl s-rest"><div class="label">rounded-2xl</div><div class="val">16px · standard</div></div>
    <div class="tile r-3xl s-rest"><div class="label">rounded-3xl</div><div class="val">20px · containers</div></div>
  </div>
  <div class="sec-title">Elevation — glass shadow system</div>
  <div class="grid">
    <div class="tile r-2xl s-rest"><div class="label">Resting</div><div class="val">glass-shadow</div></div>
    <div class="tile r-2xl s-elevated"><div class="label">Elevated</div><div class="val">blur 40 · strong</div></div>
    <div class="tile r-2xl s-magenta"><div class="label">Magenta tint</div><div class="val">0·14·34 magenta</div></div>
    <div class="tile r-2xl s-cta"><div class="label" style="color:#fff">CTA Glow</div><div class="val" style="color:rgba(255,255,255,0.75)">0·10·22 magenta</div></div>
  </div>
</body></html>
